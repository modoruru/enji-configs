project:
  origin:
    repo: modoruru/enji-configs
    branch: main
    path: test/example/example.yml
  name: Example configuraation
  description: "Example configuration for testing enji features"
  jvm_args: "-Xmx4G -Xms1G"
  auto_update: true
  
variables:
  server_port:
    description: Server port to use.
    regex: ^([1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$
    default: 25565
  online_mode:
    description: Enable online mode or leave offline
    regex: "true|false"
    default: "false"
  server_name:
    description: "Server name to install"

core:
  brand: paper
  minecraft_version: 1.21.11
  build: "%latest%"

plugins:
  CommandAPI:
    source:
      type: github
      repo: CommandAPI/CommandAPI
      tag: 11.1.0
      asset: CommandAPI-11.1.0-Paper.jar

hitori:
  version: "%latest%"
  modules:
    hitori:ux:
      source:
        type: github
        repo: modoruru/hitori-ux
        tag: 1.0
        asset: ux-1.0.jar
      configs:
        - plugins/hitori/hitori_ux/config.yml